name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A5A87A: ${{ secrets.A5A87A }}
          B85B9B: ${{ secrets.B85B9B }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A5A87A', '')
          k2 = os.environ.get('B85B9B', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- 2b00dd6a176de6fe -->', k1) if k1 else txt
          out = out.replace('<!--  -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
